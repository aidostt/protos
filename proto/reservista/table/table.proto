syntax = "proto3";

package table;

import "google/protobuf/timestamp.proto";

option go_package = "aidostt.reservista.proto_table.v1;proto_table";


service Table {
  rpc GetAllTables (Empty) returns (TableListResponse);
  rpc GetTablesByRestId (IDRequest) returns (TableListResponse);
  rpc GetTable (IDRequest) returns (TableObject);
  rpc AddTable (AddTableRequest) returns (StatusResponse);
  rpc UpdateTableById (UpdateTableRequest) returns (StatusResponse);
  rpc DeleteTableById (IDRequest) returns (StatusResponse);
  rpc GetAvailableTables (AvailabilityRequest) returns (TableListResponse);
  rpc GetReservedTables (AvailabilityRequest) returns (TableListResponse);
}

message Empty {}


message AddTableRequest {
  int32 NumberOfSeats = 1;
  bool IsReserved = 2;
  int32 TableNumber = 3;
  string restaurantID = 4;
}


message TableObject {
  string id = 1;
  int32 NumberOfSeats = 2;
  bool IsReserved = 3;
  int32 TableNumber = 4;
  RestaurantObject restaurant = 5;
}

message UpdateTableRequest {
  string id = 1;
  int32 NumberOfSeats = 2;
  bool IsReserved = 3;
  int32 TableNumber = 4;
}

message RestaurantObject {
  string id = 1;
  string name = 2;
  string address = 3;
  string contact = 4;
}

message IDRequest {
  string id = 1;
}

// AvailabilityRequest asks for the tables of a restaurant that are free (or
// taken) for a booking starting at start_at. The slot length is the
// restaurant's turn duration, applied server-side.
message AvailabilityRequest {
  string restaurant_id = 1;
  google.protobuf.Timestamp start_at = 2;
}

message StatusResponse {
  bool status = 1;
}

message TableListResponse {
  repeated TableObject tables = 1;
}
